name: AgentDeepDive CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agentdeep
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run Database Migrations
      env:
        AGENTDEEP_POSTGRES_HOST: localhost
        AGENTDEEP_POSTGRES_PORT: 5432
        AGENTDEEP_POSTGRES_DB: agentdeep
        AGENTDEEP_POSTGRES_USER: postgres
        AGENTDEEP_POSTGRES_PASSWORD: postgres_password
      run: |
        alembic upgrade head

    - name: Run Tests
      env:
        AGENTDEEP_POSTGRES_HOST: localhost
        AGENTDEEP_POSTGRES_PORT: 5432
        AGENTDEEP_POSTGRES_DB: agentdeep
        AGENTDEEP_POSTGRES_USER: postgres
        AGENTDEEP_POSTGRES_PASSWORD: postgres_password
        AGENTDEEP_REDIS_HOST: localhost
        AGENTDEEP_REDIS_PORT: 6379
        AGENTDEEP_MILVUS_HOST: localhost
        AGENTDEEP_MILVUS_PORT: 19530
        AGENTDEEP_DEBUG: "true"
        AGENTDEEP_LOG_LEVEL: "INFO"
      run: |
        pytest -v
