# AgentDeepDive Pre-Commit Hook Configuration
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: agentdeepdive-local-security-scan
        name: AgentDeepDive Local Secrets Scan
        entry: python3 scripts/security_scan.py
        language: system
        stages: [commit]
