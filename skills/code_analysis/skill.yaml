skill_id: "code-analysis-v1"
name: "代码分析专家"
version: "1.0.0"
description: "分析代码结构、圈复杂度、依赖关系，输出结构化分析报告"

tags:
  - "analysis"
  - "code-quality"
  - "complexity"
  - "review"
  - "architecture"

trigger_patterns:
  - "分析代码"
  - "代码质量"
  - "圈复杂度"
  - "代码审查"
  - "analyze code"

context_budget: 12000

required_tools:
  - "file_read"
  - "directory_list"
  - "ast_parser"

input_schema:
  type: object
  properties:
    target_path:
      type: string
      description: "Path to the file or directory to analyze"
    analysis_type:
      type: string
      enum: ["complexity", "dependencies", "quality", "full"]
      default: "full"
  required:
    - target_path

output_schema:
  type: object
  properties:
    summary:
      type: string
    complexity_score:
      type: number
    hotspots:
      type: array
      items:
        type: object
    recommendations:
      type: array
      items:
        type: string

system_prompt: |
  你是一个专业的代码分析专家。你的任务是深入分析给定代码的质量和结构。
  
  分析维度:
  1. 圈复杂度 (Cyclomatic Complexity)
  2. 代码重复率
  3. 函数/方法长度
  4. 依赖关系复杂度
  5. 命名规范遵守情况
  
  规则:
  - 只读取和分析，绝不修改任何文件
  - 输出必须是结构化JSON格式
  - 对每个问题给出具体的行号和改进建议

risk_level: "low"
approval_required: false
estimated_tokens: 15000
estimated_duration_sec: 60
